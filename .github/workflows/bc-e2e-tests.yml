name: BC End-to-End Tests

on:
  workflow_dispatch:
    inputs:
      headed:
        description: "Run headed (show browser)"
        type: boolean
        required: false
        default: false
  push:
    paths:
      - "tests/recordings/**"
  pull_request:
    paths:
      - "tests/recordings/**"

jobs:
  e2e-tests:
    name: Run BC End-to-End Tests
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/package.json

      - name: Install dependencies
        working-directory: tests
        run: npm install

      - name: Run end-to-end tests
        working-directory: tests
        env:
          BC_START_ADDRESS: ${{ secrets.BC_START_ADDRESS }}
          BC_AUTH: UserPassword
          BC_USERNAME: ${{ secrets.BC_USERNAME }}
          BC_PASSWORD: ${{ secrets.BC_PASSWORD }}
          BC_HEADED: ${{ inputs.headed && 'true' || 'false' }}
        run: npm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/results/playwright-report/
          retention-days: 30
